<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BOT ARENA // Trading Floor</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>"/>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;600&display=swap');
  :root {
    --bg:#080a0f;--surface:#0d1017;--border:#1a1f2e;
    --cyan:#00d4ff;--green:#00ff9d;--red:#ff4757;--amber:#f59e0b;
    --purple:#7c3aed;--gold:#c8a96e;--pink:#ff6b9d;
    --text:#e2e8f0;--muted:#4a5568;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);overflow:hidden}
  #app{font-family:'IBM Plex Mono',monospace;color:var(--text);height:100vh;display:flex;flex-direction:column}

  /* HEADER */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
  .logo{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:900;letter-spacing:3px}
  .logo .a{color:var(--cyan)}.logo .b{color:var(--muted);font-weight:400;font-size:9px}
  .market-ticker{display:flex;gap:14px;margin-left:16px;font-size:10px;color:var(--muted)}
  .tick-up{color:var(--green)}.tick-down{color:var(--red)}.tick-sym{color:var(--text);font-weight:600}
  .header-stats{margin-left:auto;display:flex;gap:16px;font-size:10px}
  .header-stats span{color:var(--muted)}.header-stats strong{color:var(--cyan)}
  .vault-stat strong{color:var(--gold)!important}
  #clock{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--gold);letter-spacing:1px}
  .sound-btn{font-size:13px;cursor:pointer;background:none;border:none;opacity:0.5;transition:opacity 0.2s}
  .sound-btn.on{opacity:1}

  /* CONTROLS */
  .controls{background:var(--surface);border-bottom:1px solid var(--border);padding:5px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0}
  .ctrl-btn{background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-size:9px;padding:3px 10px;cursor:pointer;font-family:'Orbitron',sans-serif;letter-spacing:1px;transition:all .15s}
  .ctrl-btn:hover{border-color:var(--cyan);color:var(--cyan)}
  .ctrl-btn.active{background:rgba(0,212,255,.1);border-color:var(--cyan);color:var(--cyan)}
  .ctrl-btn.go{border-color:var(--green);color:var(--green)}.ctrl-btn.go:hover{background:rgba(0,255,157,.1)}
  .ctrl-btn.stop{border-color:var(--red);color:var(--red)}.ctrl-btn.stop:hover{background:rgba(255,71,87,.1)}
  .size-control{display:flex;align-items:center;gap:4px;margin-left:8px}
  .size-label{font-size:8px;color:var(--muted);letter-spacing:1px}
  .size-btn{background:transparent;border:1px solid var(--border);border-radius:3px;color:var(--muted);font-size:8px;padding:2px 6px;cursor:pointer;font-family:'Orbitron',sans-serif;transition:all .15s}
  .size-btn:hover{border-color:var(--amber);color:var(--amber)}
  .size-btn.active{background:rgba(245,158,11,.1);border-color:var(--amber);color:var(--amber)}
  .speed-label{font-size:8px;color:var(--muted);letter-spacing:1px}

  /* MAIN 3-COL */
  main{flex:1;display:flex;overflow:hidden}

  /* LEFT PANEL */
  .left-panel{width:240px;min-width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
  .panel-section{border-bottom:1px solid var(--border);padding:8px 10px;flex-shrink:0}
  .panel-title{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--muted);margin-bottom:6px}
  .panel-title.gold{color:var(--gold)}

  /* SENTIMENT */
  .sentiment-bar{height:8px;border-radius:4px;background:var(--border);overflow:hidden;margin:4px 0}
  .sentiment-fill{height:100%;border-radius:4px;transition:width .5s,background .5s}
  .sentiment-labels{display:flex;justify-content:space-between;font-size:8px}
  .sentiment-labels .bear{color:var(--red)}.sentiment-labels .bull{color:var(--green)}

  /* WATCHLIST */
  .watchlist{flex:1;overflow-y:auto;padding:4px 0}
  .watch-item{padding:6px 10px;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(26,31,46,.4);cursor:pointer;transition:background .15s}
  .watch-item:hover{background:rgba(0,212,255,.03)}
  .watch-sym{font-weight:700;font-size:10px;width:36px;color:var(--text)}
  .watch-price{font-size:10px;flex:1}
  .watch-mini{width:60px;height:20px}
  .watch-mini canvas{width:100%;height:100%}
  .watch-chg{font-size:9px;font-weight:600;text-align:right;min-width:50px}

  /* VAULT INVESTMENTS */
  .vault-holdings{font-size:9px}
  .vault-row{display:flex;justify-content:space-between;padding:2px 0;color:var(--muted)}
  .vault-row .asset{color:var(--gold)}
  .vault-row .val{color:var(--text)}

  /* NEWS */
  .news-feed{flex:1;overflow-y:auto;min-height:0}
  .news-item{padding:5px 10px;border-bottom:1px solid rgba(26,31,46,.4);font-size:9px;color:var(--muted);line-height:1.3}
  .news-item .time{color:var(--cyan);font-size:8px}

  /* CENTER */
  .arena{flex:1;padding:10px;overflow-y:auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;align-content:start}
  .table-view{display:none;flex:1;align-items:center;justify-content:center;padding:20px;position:relative}
  .table-view.active{display:flex}.arena.active{display:grid}.arena:not(.active){display:none}

  /* BOT CARDS */
  .bot-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;transition:border-color .3s;position:relative;cursor:pointer;min-height:auto}
  .bot-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
  .bot-card.positive{border-color:rgba(0,255,157,.2)}.bot-card.positive::before{background:var(--green)}
  .bot-card.negative{border-color:rgba(255,71,87,.2)}.bot-card.negative::before{background:var(--red)}
  .bot-card.neutral::before{background:var(--muted)}
  .bot-card.you-card{border-color:rgba(0,212,255,.3)}.bot-card.you-card::before{background:var(--cyan)}

  .bot-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .bot-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;position:relative}
  .activity-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;border:1px solid var(--surface)}
  .bot-name{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px}
  .bot-style{font-size:8px;color:var(--muted);letter-spacing:.5px}
  .bot-pnl{margin-left:auto;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;white-space:nowrap}
  .pnl-up{color:var(--green)}.pnl-down{color:var(--red)}.pnl-flat{color:var(--muted)}

  .bot-detail{overflow:visible}
  .bot-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin:5px 0}
  .stat-box{background:rgba(0,0,0,.3);border-radius:3px;padding:3px;text-align:center}
  .stat-val{font-size:10px;font-weight:600;color:var(--text)}
  .stat-label{font-size:7px;color:var(--muted);letter-spacing:1px}

  .bot-position{background:rgba(0,0,0,.2);border-radius:3px;padding:4px 6px;font-size:9px;display:flex;align-items:center;gap:6px;margin-top:3px;flex-wrap:wrap}
  .pos-side{font-weight:700;font-size:8px;padding:1px 5px;border-radius:2px;letter-spacing:1px}
  .pos-long{background:rgba(0,255,157,.15);color:var(--green)}.pos-short{background:rgba(255,71,87,.15);color:var(--red)}
  .pos-flat{background:rgba(74,85,104,.3);color:var(--muted)}
  .pos-sym{color:var(--text);font-weight:600}.pos-entry{color:var(--muted)}.pos-pnl{margin-left:auto;font-weight:600}

  .bot-personality{font-size:8px;color:var(--muted);margin:4px 0;padding:4px 6px;background:rgba(0,0,0,.25);border-radius:3px;border-left:2px solid;line-height:1.3}
  .trait{display:inline-block;font-size:7px;padding:1px 3px;border-radius:2px;background:rgba(255,255,255,.05);margin:1px 1px 0 0;letter-spacing:.3px}

  .line-chart{margin-top:4px;height:30px;position:relative}
  .line-chart canvas{width:100%;height:100%}

  /* RIGHT PANEL */
  .right-panel{width:260px;min-width:260px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column}
  .trade-panel{border-bottom:1px solid var(--border);padding:8px 10px;flex-shrink:0}
  .trade-panel-title{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--cyan);margin-bottom:5px}
  .trade-row{display:flex;gap:4px;margin-bottom:4px;align-items:center}
  .trade-select,.trade-input{background:rgba(0,0,0,.3);border:1px solid var(--border);border-radius:3px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:3px 5px;outline:none}
  .trade-select:focus,.trade-input:focus{border-color:var(--cyan)}
  .trade-select{flex:1}.trade-input{width:36px;text-align:center}
  .trade-btn{flex:1;padding:5px;border:none;border-radius:3px;font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all .15s}
  .trade-btn-long{background:rgba(0,255,157,.15);color:var(--green)}.trade-btn-long:hover{background:rgba(0,255,157,.3)}
  .trade-btn-short{background:rgba(255,71,87,.15);color:var(--red)}.trade-btn-short:hover{background:rgba(255,71,87,.3)}
  .trade-btn-close{background:rgba(200,169,110,.15);color:var(--gold)}.trade-btn-close:hover{background:rgba(200,169,110,.3)}
  .trade-btn-auto{background:rgba(124,58,237,.15);color:var(--purple)}.trade-btn-auto:hover{background:rgba(124,58,237,.3)}
  .trade-btn-auto.on{background:rgba(124,58,237,.3);box-shadow:0 0 8px rgba(124,58,237,.3)}
  .your-positions{font-size:9px;color:var(--muted);margin-top:4px;max-height:80px;overflow-y:auto}
  .your-pos-row{display:flex;align-items:center;gap:4px;padding:2px 4px;background:rgba(0,0,0,.15);border-radius:2px;margin-bottom:2px}
  .your-pos-row .close-x{color:var(--red);cursor:pointer;margin-left:auto;font-weight:700;font-size:10px}

  .log-title{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--muted);padding:6px 10px 4px;border-bottom:1px solid var(--border);flex-shrink:0}
  .log-entries{flex:1;overflow-y:auto;padding:2px 0}
  .log-entry{padding:2px 10px;font-size:9px;display:flex;gap:4px;border-bottom:1px solid rgba(26,31,46,.4)}
  .log-time{color:var(--muted);font-size:8px;min-width:44px}.log-bot{font-weight:600;min-width:44px}
  .log-action{color:var(--muted)}.log-buy{color:var(--green)}.log-sell{color:var(--red)}

  .leaderboard{border-top:1px solid var(--border);padding:6px 10px;flex-shrink:0}
  .lb-title{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:var(--gold);margin-bottom:3px}
  .lb-row{display:flex;align-items:center;gap:5px;font-size:9px;padding:1px 0}
  .lb-rank{color:var(--muted);width:14px}.lb-name{flex:1}.lb-val{font-weight:600}

  ::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;display:inline-block}

  /* COLLAPSIBLE SECTIONS */
  .section-toggle{grid-column:1/-1;background:var(--surface);border:1px solid var(--border);border-radius:8px}
  .section-header{display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;user-select:none;transition:background .15s}
  .section-header:hover{background:rgba(0,212,255,.03)}
  .section-header .chevron{font-size:10px;color:var(--muted);transition:transform .2s}
  .section-header .chevron.open{transform:rotate(90deg)}
  .section-body{max-height:0;overflow:hidden;transition:max-height .3s ease,padding .3s ease;padding:0 14px}
  .section-body.open{max-height:2000px;padding:8px 14px 14px;overflow:visible}

  /* CIVILIZATION JOURNEY */
  .civ-road{position:relative}
  .civ-title{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--gold);letter-spacing:2px;display:flex;align-items:center;gap:8px}
  .civ-track{position:relative;height:44px;margin:8px 10px 0}
  .civ-line{position:absolute;top:20px;left:0;right:0;height:4px;background:var(--border);border-radius:2px}
  .civ-progress{position:absolute;top:20px;left:0;height:4px;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--cyan));transition:width .8s;box-shadow:0 0 8px rgba(200,169,110,.4)}
  .civ-milestone{position:absolute;top:10px;display:flex;flex-direction:column;align-items:center;transition:all .3s}
  .civ-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border);background:var(--bg);font-size:8px;display:flex;align-items:center;justify-content:center;z-index:2;transition:all .3s}
  .civ-dot.reached{border-color:var(--gold);background:var(--gold);box-shadow:0 0 8px rgba(200,169,110,.6)}
  .civ-dot.current{border-color:var(--cyan);background:var(--cyan);animation:pulse 1.5s infinite;box-shadow:0 0 12px rgba(0,212,255,.5)}
  .civ-label{font-size:7px;color:var(--muted);letter-spacing:.5px;margin-top:3px;white-space:nowrap}
  .civ-label.reached{color:var(--gold)}.civ-label.current{color:var(--cyan)}
  .civ-rank{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--muted);text-align:center;margin-top:8px;letter-spacing:1px}
  .civ-rank strong{color:var(--gold)}

  /* REPORTS SECTION */
  .reports-inner{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px}
  .report-block{background:rgba(0,0,0,.2);border-radius:6px;padding:8px 10px}
  .report-title{font-family:'Orbitron',sans-serif;font-size:8px;color:var(--muted);letter-spacing:1.5px;margin-bottom:6px}
  .heatmap-grid{display:grid;gap:2px}
  .heat-cell{border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:6px;font-weight:700;letter-spacing:.3px;padding:4px 2px}
  .report-row{display:flex;justify-content:space-between;font-size:9px;padding:2px 0;color:var(--muted)}
  .report-row .rv{font-weight:600}

  /* RULES SECTION */
  .rules-inner{font-size:9px;color:var(--muted);line-height:1.5}
  .rules-inner h3{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--cyan);letter-spacing:1px;margin:8px 0 4px}
  .rules-inner h3:first-child{margin-top:0}
  .rules-inner li{margin-left:12px;margin-bottom:2px}
  .rules-inner .emoji-label{font-size:11px;margin-right:4px}

  /* TABLE VIEW */
  .poker-table{width:min(750px,90vw);height:min(450px,55vh);background:radial-gradient(ellipse at center,#1a3a2a 0%,#0d2218 60%,#091a12 100%);border-radius:200px;border:8px solid #2a1a0a;box-shadow:0 0 60px rgba(0,0,0,.6),inset 0 0 80px rgba(0,0,0,.3),0 0 0 12px #1a1008,0 0 0 14px #0d0a04;position:relative;display:flex;align-items:center;justify-content:center}
  .pentagram-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
  .table-center{text-align:center;z-index:2;position:relative}
  .vault-icon{font-size:36px;filter:drop-shadow(0 0 10px rgba(200,169,110,.5))}
  .table-vault-amount{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:var(--gold);letter-spacing:2px}
  .table-label{font-size:9px;color:var(--muted);letter-spacing:2px;margin-top:2px}
  .vault-pnl-line{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;margin-top:3px}
  .table-trades-info{font-size:9px;color:var(--muted);margin-top:3px}
  .data-badge{position:absolute;top:6px;left:12px;font-size:7px;letter-spacing:1px;padding:2px 5px;border-radius:3px;background:rgba(0,0,0,.3);color:var(--muted);z-index:3}
  .data-badge.live{color:var(--green)}

  .table-bot{position:absolute;display:flex;flex-direction:column;align-items:center;gap:2px;transition:all .3s;z-index:2}
  .table-bot-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid;box-shadow:0 0 12px rgba(0,0,0,.4)}
  .table-bot-name{font-family:'Orbitron',sans-serif;font-size:8px;font-weight:700;letter-spacing:1px}
  .table-bot-pnl{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;background:rgba(0,0,0,.5)}
  .table-bot-pos{font-size:7px;letter-spacing:.5px;padding:1px 5px;border-radius:3px;background:rgba(0,0,0,.4)}
  .table-bot-cards{display:flex;gap:2px;margin-top:1px}
  .mini-card{width:20px;height:28px;background:#fff;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;box-shadow:0 1px 3px rgba(0,0,0,.3)}

  /* CHIP STACKS */
  .chip-stack{display:flex;flex-direction:column-reverse;align-items:center;margin-top:2px}
  .chip{width:28px;height:7px;border-radius:4px;margin-top:-3px;box-shadow:0 1px 2px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.15)}

  /* SETTINGS MODAL */
  .settings-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
  .settings-overlay.open{display:flex}
  .settings-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;width:340px;max-height:80vh;overflow-y:auto}
  .settings-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .settings-close{margin-left:auto;background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer}.settings-close:hover{color:var(--text)}
  .slider-group{margin-bottom:10px}
  .slider-label{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);letter-spacing:1px;margin-bottom:3px}
  .slider-val{color:var(--text);font-weight:600}
  input[type="range"]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:var(--border);outline:none}
  input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--cyan);cursor:pointer;border:none}
  .reset-defaults-btn{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);border-radius:3px;color:var(--red);font-size:8px;padding:4px 10px;cursor:pointer;font-family:'Orbitron',sans-serif;letter-spacing:1px;margin-top:8px;width:100%}
  .reset-defaults-btn:hover{background:rgba(255,71,87,.2)}

  /* MOBILE */
  .mobile-toggle{display:none;position:fixed;bottom:10px;z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:10px;color:var(--cyan);cursor:pointer;font-family:'Orbitron',sans-serif}
  .mobile-toggle-left{left:10px}.mobile-toggle-right{right:10px}
  @media(max-width:900px){
    .left-panel,.right-panel{position:fixed;top:0;bottom:0;z-index:40;transition:transform .3s}
    .left-panel{left:0;transform:translateX(-100%)}.left-panel.open{transform:translateX(0)}
    .right-panel{right:0;transform:translateX(100%)}.right-panel.open{transform:translateX(0)}
    .mobile-toggle{display:block}
    .controls{flex-wrap:wrap;gap:4px}
    .market-ticker{display:none}
    #clock{display:none}
    .header-stats{font-size:9px;gap:8px}
    .arena{-webkit-overflow-scrolling:touch;overflow-y:scroll!important;grid-template-columns:1fr!important;padding:8px}
    .bot-card{padding:8px}
    .bot-pnl{font-size:12px}
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">🏛️ <span class="a">BOT ARENA</span> <span class="b">// TRADING FLOOR</span></div>
    <div class="market-ticker" id="ticker"></div>
    <div class="header-stats">
      <span>BOTS <strong id="h-bots">7</strong></span>
      <span>TRADES <strong id="h-trades">0</strong></span>
      <span class="vault-stat">VAULT <strong id="h-vault">$100,000</strong></span>
      <span>NET <strong id="h-net" style="color:var(--gold)">$100,000</strong></span>
      <span>P&L <strong id="h-pnl">$0.00</strong></span>

<script>
// ═══ SOUND ═══
let audioCtx=null,soundOn=true;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(f,d,t='sine',v=.1,s=0){if(!soundOn)return;initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.setValueAtTime(f,audioCtx.currentTime);if(s)o.frequency.linearRampToValueAtTime(f+s,audioCtx.currentTime+d);g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function soundBuy(){playTone(440,.12,'sine',.07,180);setTimeout(()=>playTone(660,.1,'sine',.05),70)}
function soundWin(){playTone(523,.1,'sine',.09);setTimeout(()=>playTone(659,.1,'sine',.09),90);setTimeout(()=>playTone(784,.18,'sine',.08),180)}
function soundLoss(){playTone(380,.18,'sine',.07,-140);setTimeout(()=>playTone(240,.25,'sine',.05),100)}
function soundManualBuy(){playTone(600,.07,'sine',.1);setTimeout(()=>playTone(800,.07,'sine',.1),50);setTimeout(()=>playTone(1000,.12,'sine',.08),100)}
function soundManualClose(){playTone(800,.08,'triangle',.08);setTimeout(()=>playTone(600,.12,'triangle',.06),70)}
function soundStart(){playTone(330,.12,'sine',.08);setTimeout(()=>playTone(440,.12,'sine',.08),100);setTimeout(()=>playTone(554,.12,'sine',.08),200);setTimeout(()=>playTone(660,.25,'sine',.1),300)}
function soundStop(){playTone(660,.12,'sine',.08);setTimeout(()=>playTone(440,.12,'sine',.06),100);setTimeout(()=>playTone(330,.25,'sine',.05),200)}
function soundReset(){playTone(880,.06,'sine',.06);setTimeout(()=>playTone(660,.06,'sine',.06),60);setTimeout(()=>playTone(440,.06,'sine',.06),120);setTimeout(()=>playTone(330,.2,'sine',.05),180)}

// ═══ BOTS ═══
const BOT_DEFAULTS=[
  {id:'viper',name:'VIPER',emoji:'🐍',color:'#00ff9d',style:'AGGRESSIVE SCALPER',personality:'The pit viper. Strikes the moment momentum shows. Tight stops, rides winners.',traits:['MOMENTUM','FAST EXIT','TREND','HIGH RISK'],prefSize:2,aggression:.8,patience:.2},
  {id:'ghost',name:'GHOST',emoji:'👻',color:'#7c3aed',style:'MEAN REVERSION',personality:'The contrarian. When everyone buys, Ghost sells. Fades moves to VWAP.',traits:['CONTRARIAN','VWAP','FADE','PATIENT'],prefSize:1,aggression:.3,patience:.7},
  {id:'stone',name:'STONE',emoji:'🗿',color:'#64748b',style:'PATIENT SNIPER',personality:'Only A+ setups. One trade a day. Massive R:R targets.',traits:['SELECTIVE','BIG R:R','LOW FREQ','DISCIPLINE'],prefSize:3,aggression:.2,patience:.9},
  {id:'blaze',name:'BLAZE',emoji:'🔥',color:'#ff4757',style:'HIGH FREQUENCY',personality:'Rapid-fire. 50+ trades/day, tiny profits each. The 1-tick game.',traits:['VOLUME','SCALP','SMALL EDGE','SPEED'],prefSize:1,aggression:.9,patience:.1},
  {id:'nova',name:'NOVA',emoji:'⭐',color:'#f59e0b',style:'INDICATOR NERD',personality:'RSI, VWAP, EMA crossovers, Bollinger. Balanced approach.',traits:['TECHNICAL','RSI','VWAP','BALANCED'],prefSize:2,aggression:.5,patience:.5},
  {id:'oracle',name:'ORACLE',emoji:'🔮',color:'#e879f9',style:'EXPERT QUANT',personality:'Multi-signal quant. Combines momentum, mean reversion, volatility regime. Trades only A+ setups with optimal sizing.',traits:['QUANT','MULTI-SIGNAL','ADAPTIVE','EDGE'],prefSize:2,aggression:.4,patience:.8},
];

const SYMBOLS=['MES','MNQ','MGC','MCL','M2K','EURUSD','GBPUSD'];
const SYM_PRICES={MES:6627,MNQ:24570,MGC:4658,MCL:93.10,M2K:2530,EURUSD:1.0890,GBPUSD:1.2940};
const SYM_TICK={MES:.25,MNQ:.25,MGC:.10,MCL:.01,M2K:.10,EURUSD:.0001,GBPUSD:.0001};
const SYM_TICKVAL={MES:1.25,MNQ:.50,MGC:1.00,MCL:1.00,M2K:.50,EURUSD:1.00,GBPUSD:1.00};

// Extra watchlist items (ETFs, stocks)
const WATCH_EXTRA=[
  {sym:'SPY',yahoo:'SPY',price:560},{sym:'QQQ',yahoo:'QQQ',price:470},
  {sym:'GLD',yahoo:'GLD',price:215},{sym:'TLT',yahoo:'TLT',price:90},

  {sym:'EUR',yahoo:'EURUSD=X',price:1.089},{sym:'GBP',yahoo:'GBPUSD=X',price:1.294},
];

let globalSizeMult=1;
const VAULT_START=100000;

let state={
  running:false,speed:1,tick:0,
  vault:VAULT_START,vaultHistory:[VAULT_START],taxCollected:0,
  vaultHoldings:{GOLD:0,TBILLS:0,CASH:VAULT_START},
  bots:BOT_DEFAULTS.map(b=>({...b,pnl:0,trades:0,wins:0,losses:0,position:null,history:[],pnlHistory:[0],borrowed:0,enabled:true,markets:[...SYMBOLS]})),
  you:{name:'YOU',emoji:'🎯',color:'#00d4ff',style:'MANUAL TRADER',pnl:0,trades:0,wins:0,losses:0,positions:[],pnlHistory:[0],borrowed:0,
    autoTrade:false,aggression:.5,patience:.5,prefSize:1},
  logs:[],prices:{...SYM_PRICES},
  watchPrices:{},watchHistories:{},
};

// ═══ GLOBALS ═══
let useRealData=false,realBasePrices={};
const priceHistory={};SYMBOLS.forEach(s=>priceHistory[s]=[]);
const YAHOO_SYMS={MES:'ES=F',MNQ:'NQ=F',MGC:'GC=F',MCL:'CL=F',M2K:'RTY=F',EURUSD:'EURUSD=X',GBPUSD:'GBPUSD=X'};
const CORS_PROXIES=[u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,u=>`https://corsproxy.io/?${encodeURIComponent(u)}`];

function setGlobalSize(s,btn){globalSizeMult=s;document.querySelectorAll('.size-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active')}
window.setGlobalSize=setGlobalSize;

// ═══ MANUAL TRADING (multi-position) ═══
function manualTrade(side){
  initAudio();
  const sym=document.getElementById('trade-sym').value;
  const size=parseInt(document.getElementById('trade-size').value)||1;
  const price=state.prices[sym];
  const margin=price*size*.1;
  if(margin>state.vault){soundLoss();return}
  state.vault-=margin;
  state.you.positions.push({side,sym,entry:price,size,margin,id:Date.now()});
  state.you.borrowed+=margin;
  addLog(state.you,'buy',`${size}x ${side} ${sym} @ ${price.toFixed(2)}`);
  soundManualBuy();
  renderYourPos();
}
window.manualTrade=manualTrade;

function manualCloseOne(posId){
  initAudio();
  const idx=state.you.positions.findIndex(p=>p.id===posId);
  if(idx<0)return;
  const pos=state.you.positions[idx];
  const price=state.prices[pos.sym];
  const diff=pos.side==='LONG'?price-pos.entry:pos.entry-price;
  const pnl=(diff/SYM_TICK[pos.sym])*SYM_TICKVAL[pos.sym]*pos.size;
  state.you.pnl+=pnl;state.you.trades++;
  if(pnl>0){state.you.wins++;soundWin()}else{state.you.losses++;soundLoss()}
  state.vault+=pos.margin+pnl;state.you.borrowed-=pos.margin;
  state.you.pnlHistory.push(state.you.pnl);
  if(state.you.pnlHistory.length>60)state.you.pnlHistory.shift();
  addLog(state.you,pnl>=0?'buy':'sell',`CLOSED ${pos.size}x ${pos.side} ${pos.sym} ${pnl>=0?'+':''}$${pnl.toFixed(2)}`);
  state.you.positions.splice(idx,1);
  soundManualClose();renderYourPos();
}
window.manualCloseOne=manualCloseOne;

function manualCloseAll(){
  while(state.you.positions.length>0)manualCloseOne(state.you.positions[0].id);
}
window.manualCloseAll=manualCloseAll;

// Auto-trade toggle for YOU
let autoTradeOn=false;
function toggleAutoTrade(){
  autoTradeOn=!autoTradeOn;
  state.you.autoTrade=autoTradeOn;
  const btn=document.getElementById('auto-btn');
  btn.textContent=autoTradeOn?'AUTO: ON':'AUTO: OFF';
  btn.classList.toggle('on',autoTradeOn);
  addLog(state.you,'buy',autoTradeOn?'Auto-trade enabled':'Auto-trade disabled');
}
window.toggleAutoTrade=toggleAutoTrade;

function simAutoYou(){
  if(!autoTradeOn||!state.running)return;
  const bot=state.you;
  const r=Math.random();
  // Close open positions
  for(let i=bot.positions.length-1;i>=0;i--){
    const pos=bot.positions[i];
    const price=state.prices[pos.sym];
    const diff=pos.side==='LONG'?price-pos.entry:pos.entry-price;
    const pnl=(diff/SYM_TICK[pos.sym])*SYM_TICKVAL[pos.sym]*pos.size;
    const tp=(3+bot.patience*20)*SYM_TICKVAL[pos.sym]*pos.size;
    const sl=(2+bot.patience*6)*SYM_TICKVAL[pos.sym]*pos.size;
    if(pnl>=tp||pnl<=-sl||r<.015*bot.aggression){manualCloseOne(pos.id)}
  }
  // Open new
  if(bot.positions.length<3&&r<.008*bot.aggression*state.speed){
    const sym=SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
    const mom5=momentum(sym,5);
    let side=null;
    if(mom5>0)side='LONG';else if(mom5<0)side='SHORT';
    if(side){
      document.getElementById('trade-sym').value=sym;
      document.getElementById('trade-size').value=Math.max(1,Math.round(bot.prefSize*globalSizeMult));
      manualTrade(side);
    }
  }
}

function renderYourPos(){
  const el=document.getElementById('your-positions');
  if(!state.you.positions.length){
    el.innerHTML=`<div style="padding:2px 0">P&L: <strong style="color:${state.you.pnl>=0?'var(--green)':'var(--red)'}">${state.you.pnl>=0?'+':''}$${state.you.pnl.toFixed(2)}</strong> | ${state.you.trades}T ${state.you.wins}W/${state.you.losses}L</div>`;
    return;
  }
  el.innerHTML=state.you.positions.map(pos=>{
    const diff=pos.side==='LONG'?state.prices[pos.sym]-pos.entry:pos.entry-state.prices[pos.sym];
    const pnl=(diff/SYM_TICK[pos.sym])*SYM_TICKVAL[pos.sym]*pos.size;
    const c=pnl>=0?'var(--green)':'var(--red)';
    return`<div class="your-pos-row"><span style="color:${pos.side==='LONG'?'var(--green)':'var(--red)'};font-size:8px">${pos.size}x${pos.side[0]}</span><span>${pos.sym}</span><span style="color:${c}">${pnl>=0?'+':''}$${pnl.toFixed(2)}</span><span class="close-x" onclick="manualCloseOne(${pos.id})">✕</span></div>`;
  }).join('')+`<div style="padding:2px 0;margin-top:2px;border-top:1px solid var(--border)">Total: <strong style="color:${state.you.pnl>=0?'var(--green)':'var(--red)'}">${state.you.pnl>=0?'+':''}$${state.you.pnl.toFixed(2)}</strong></div>`;
}

// ═══ SIMULATION ═══
function simPrices(){
  for(const sym of SYMBOLS){
    const base=SYM_PRICES[sym];
    const volPct=sym==='MNQ'?.0002:sym==='MGC'?.00015:sym==='MCL'?.002:sym==='M2K'?.0003:sym==='EURUSD'?.0001:.0002;
    const move=(Math.random()-.5)*base*volPct*.4;
    state.prices[sym]+=move;
    // Strong mean reversion — prices stay close to real regardless of speed
    if(useRealData&&realBasePrices[sym]){
      const drift=(realBasePrices[sym]-state.prices[sym])*.05;
      state.prices[sym]+=drift;
    }
    state.prices[sym]=Math.max(state.prices[sym],.01);
  }
}
function updatePriceHistory(){SYMBOLS.forEach(s=>{priceHistory[s].push(state.prices[s]);if(priceHistory[s].length>60)priceHistory[s].shift()})}
function sma(a,n){if(!a.length)return 0;if(a.length<n)return a.reduce((x,y)=>x+y,0)/a.length;return a.slice(-n).reduce((x,y)=>x+y,0)/n}
function momentum(sym,n){const h=priceHistory[sym];if(h.length<n+1)return 0;return h[h.length-1]-h[h.length-1-n]}

function simBot(bot){
  if(!bot.enabled)return;
  const r=Math.random();
  if(bot.position){
    const pos=bot.position,price=state.prices[pos.sym];
    const diff=pos.side==='LONG'?price-pos.entry:pos.entry-price;
    const pnl=(diff/SYM_TICK[pos.sym])*SYM_TICKVAL[pos.sym]*pos.size;
    // Asymmetric R:R — take profit is BIGGER than stop loss (edge)
    const rmult=bot.riskMult||1,tmult=bot.targetMult||1;
    const tp=(5+bot.patience*25)*SYM_TICKVAL[pos.sym]*pos.size*tmult;
    const sl=(2+bot.patience*4)*SYM_TICKVAL[pos.sym]*pos.size*rmult;
    // Trailing stop: once 60% to target, tighten stop to breakeven
    const trail=pnl>tp*.6?Math.max(0,sl*.3):sl;
    // Random exit much less likely — let trades run
    if(pnl>=tp||pnl<=-trail||r<.005*bot.aggression){
      bot.pnl+=pnl;bot.trades++;
      if(pnl>0){bot.wins++;if(state.tick%3===0)soundWin();
        // HOUSE TAX: 5% of profits go to vault
        const tax=pnl*.05;state.vault+=tax;bot.pnl-=tax;pnl-=tax;
        state.taxCollected=(state.taxCollected||0)+tax;
      }else{bot.losses++;if(state.tick%5===0)soundLoss()}
      state.vault+=pos.margin+pnl;bot.borrowed-=pos.margin;
      bot.pnlHistory.push(bot.pnl);if(bot.pnlHistory.length>60)bot.pnlHistory.shift();
      bot.history.push({sym:pos.sym,side:pos.side,pnl,size:pos.size,tick:state.tick});
      addLog(bot,pnl>0?'buy':'sell',`CLOSED ${pos.size}x ${pos.side} ${pos.sym} ${pnl>=0?'+':''}$${pnl.toFixed(2)}`);
      bot.position=null;
      // BOT LEARNING: after a loss, slightly adjust strategy
      if(pnl<0&&bot.losses>5){
        bot.patience=Math.min(.95,bot.patience+.01); // get more patient
        bot.aggression=Math.max(.1,bot.aggression-.005); // get less aggressive
      }
    }
  }else{
    // ENTRY: much pickier — need stronger confirmation
    const entryChance=.005*bot.aggression*state.speed;
    if(r<entryChance){
      const botMarkets=bot.markets&&bot.markets.length?bot.markets:SYMBOLS;
      const sym=botMarkets[Math.floor(Math.random()*botMarkets.length)];
      const h=priceHistory[sym];
      if(h.length<20)return; // need enough data
      const mom5=momentum(sym,5),mom10=momentum(sym,10),mom20=momentum(sym,20);
      const avg10=sma(h,10),avg20=sma(h,20),avg30=sma(h,30);
      const price=state.prices[sym];
      let side=null,confidence=0;

      if(bot.id==='viper'){
        // Need 3 timeframes agreeing
        if(mom5>0&&mom10>0&&mom20>0&&price>avg20){side='LONG';confidence=2}
        else if(mom5<0&&mom10<0&&mom20<0&&price<avg20){side='SHORT';confidence=2}
      }else if(bot.id==='ghost'){
        // Mean reversion: only fade BIG moves (2x normal), buy when oversold
        const avgVol=Math.abs(mom20)/20;
        if(price<avg30*.998&&mom5<-avgVol*1.5){side='LONG';confidence=3} // oversold bounce
        else if(price>avg30*1.002&&mom5>avgVol*1.5){side='SHORT';confidence=3} // overbought fade
      }else if(bot.id==='stone'){
        // Triple confirmation: trend + MA + momentum all agree
        if(mom20>0&&price>avg30&&price>avg20&&mom5>0&&mom10>0){side='LONG';confidence=4}
        else if(mom20<0&&price<avg30&&price<avg20&&mom5<0&&mom10<0){side='SHORT';confidence=4}
        else return;
      }else if(bot.id==='blaze'){
        // Scalper: quick in/out on micro moves, but needs clear direction
        if(mom5>0&&price>avg10){side='LONG';confidence=1}
        else if(mom5<0&&price<avg10){side='SHORT';confidence=1}
      }else if(bot.id==='nova'){
        // MA crossover + RSI proxy (momentum vs average)
        const rsiProxy=mom10>0?60:40; // simplified RSI
        if(avg10>avg20&&avg20>avg30&&rsiProxy>50&&mom5>0){side='LONG';confidence=3}
        else if(avg10<avg20&&avg20<avg30&&rsiProxy<50&&mom5<0){side='SHORT';confidence=3}
      }else if(bot.id==='oracle'){
        // EXPERT QUANT: multi-signal fusion — only trades when 4+ signals agree
        const avgVol=Math.abs(mom20)/20||.001;
        const trendUp=avg10>avg20&&avg20>avg30;
        const trendDn=avg10<avg20&&avg20<avg30;
        const momUp=mom5>0&&mom10>0&&mom20>0;
        const momDn=mom5<0&&mom10<0&&mom20<0;
        const prAbove=price>avg30;const prBelow=price<avg30;
        const volExpand=Math.abs(mom5)>avgVol*1.2; // volatility expansion
        const pullback=trendUp&&mom5<0&&price>avg20; // buy the dip in uptrend
        const pullbackDn=trendDn&&mom5>0&&price<avg20; // sell the rip in downtrend
        let signals=0;
        if(trendUp)signals++;if(momUp)signals++;if(prAbove)signals++;if(volExpand)signals++;
        if(signals>=4){side='LONG';confidence=5}
        else if(pullback&&price>avg30){side='LONG';confidence=4} // buy the dip
        signals=0;
        if(trendDn)signals++;if(momDn)signals++;if(prBelow)signals++;if(volExpand)signals++;
        if(signals>=4){side='SHORT';confidence=5}
        else if(pullbackDn&&price<avg30&&!side){side='SHORT';confidence=4}
      }
      if(!side)return;

      // Scale size by confidence
      const baseSize=Math.max(1,Math.round(bot.prefSize*globalSizeMult));
      const size=Math.max(1,Math.round(baseSize*(confidence>=3?1.5:confidence>=2?1:0.5)));
      const margin=price*size*.05;
      if(margin>state.vault||margin>state.vault*.1)return; // don't use more than 10% of vault
      state.vault-=margin;bot.borrowed+=margin;
      bot.position={side,sym,entry:price,size,margin};
      if(state.tick%4===0)soundBuy();
      addLog(bot,'buy',`${size}x ${side} ${sym} @ ${price.toFixed(2)}`);
    }
  }
}

// ═══ VAULT AUTO-INVEST ═══
function vaultInvest(){
  // Smart house allocation: adapts to market conditions
  const total=state.vault;
  // If gold is trending up, allocate more to gold; if markets volatile, more to T-Bills
  const goldMom=priceHistory.MGC?.length>10?momentum('MGC',10):0;
  const goldBias=goldMom>0?.4:.2; // 20-40% gold based on momentum
  const tbillPct=.35;
  const cashPct=1-goldBias-tbillPct;
  state.vaultHoldings.CASH=total*cashPct;
  state.vaultHoldings.TBILLS=total*tbillPct;
  state.vaultHoldings.GOLD=total*goldBias;
  // T-Bills earn interest (risk-free yield ~4.5% annual, per tick)
  state.vault+=state.vaultHoldings.TBILLS*0.000015;
  // Gold tracks real MGC price changes
  if(realBasePrices.MGC){
    const goldChg=(state.prices.MGC-realBasePrices.MGC)/realBasePrices.MGC;
    state.vault+=state.vaultHoldings.GOLD*goldChg*0.001;
  }
}

function addLog(bot,type,msg){
  const now=new Date();
  const t=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  state.logs.unshift({time:t,bot:bot.name,color:bot.color,type,msg});
  if(state.logs.length>200)state.logs.pop();
}

// ═══ LINE CHART ═══
function drawLineChart(canvas,data,color){
  if(!canvas||data.length<2)return;
  const ctx=canvas.getContext('2d');const w=canvas.width=canvas.offsetWidth*2;const h=canvas.height=canvas.offsetHeight*2;
  ctx.clearRect(0,0,w,h);
  const min=Math.min(...data),max=Math.max(...data),range=max-min||1,pad=4;
  if(min<0&&max>0){const zy=h-pad-((0-min)/range)*(h-pad*2);ctx.strokeStyle='rgba(74,85,104,.3)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(0,zy);ctx.lineTo(w,zy);ctx.stroke();ctx.setLineDash([])}
  ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineJoin='round';ctx.beginPath();
  data.forEach((v,i)=>{const x=(i/(data.length-1))*w;const y=h-pad-((v-min)/range)*(h-pad*2);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)});
  ctx.stroke();ctx.lineTo(w,h);ctx.lineTo(0,h);ctx.closePath();
  const grad=ctx.createLinearGradient(0,0,0,h);grad.addColorStop(0,color+'30');grad.addColorStop(1,color+'05');ctx.fillStyle=grad;ctx.fill();
}

function makeChipStack(pnl,color){
  if(pnl<=0)return`<div style="font-size:7px;color:var(--red);margin-top:2px">💀</div>`;
  const chips=Math.min(10,Math.max(1,Math.ceil(pnl/200)));

function drawPentagram(){
  const canvas=document.getElementById('pentagram-canvas'),table=document.getElementById('poker-table');
  if(!canvas||!table)return;canvas.width=table.offsetWidth;canvas.height=table.offsetHeight;
  const ctx=canvas.getContext('2d'),cx=canvas.width/2,cy=canvas.height/2,r=Math.min(cx,cy)*.55;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='rgba(200,169,110,.1)';ctx.lineWidth=1;ctx.beginPath();
  for(let i=0;i<5;i++){const a=(i*144-90)*Math.PI/180;const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y)}
  ctx.closePath();ctx.stroke();
}

let propFirmOn=false;
function togglePropFirm(){
  propFirmOn=!propFirmOn;
  const btn=document.getElementById('prop-btn');
  btn.textContent=propFirmOn?'PROP: ON':'PROP: OFF';
  btn.classList.toggle('active',propFirmOn);

}
window.togglePropFirm=togglePropFirm;

function checkPropFirm(){
  if(!propFirmOn)return;
  state.bots.forEach(bot=>{
    if(bot.enabled&&bot.pnl<-500){
      bot.enabled=false;
      bot.firedTick=state.tick;
      if(bot.position){
        const pos=bot.position,price=state.prices[pos.sym];
        const diff=pos.side==='LONG'?price-pos.entry:pos.entry-price;
        const pnl=(diff/SYM_TICK[pos.sym])*SYM_TICKVAL[pos.sym]*pos.size;
        bot.pnl+=pnl;bot.trades++;if(pnl>0)bot.wins++;else bot.losses++;
        state.vault+=pos.margin+pnl;bot.borrowed-=pos.margin;
        bot.position=null;
      }
      addLog(bot,'sell',`🔥 FIRED — drawdown exceeded $500. Rehiring in 50 ticks with safer params`);
      soundLoss();
    }
    // Rehire fired bots after 50 ticks with adjusted params
    if(!bot.enabled&&bot.firedTick&&(state.tick-bot.firedTick)>50){
      bot.enabled=true;
      bot.pnl=0;bot.trades=0;bot.wins=0;bot.losses=0; // clean slate
      bot.patience=Math.min(.95,bot.patience+.1); // more patient
      bot.aggression=Math.max(.1,bot.aggression-.1); // less aggressive
      bot.firedTick=null;
      addLog(bot,'buy',`♻️ REHIRED with safer params (patience ${(bot.patience*100).toFixed(0)}%, aggression ${(bot.aggression*100).toFixed(0)}%)`);
    }
  });
}

function renderCivRoadInner(){
  const v=state.vault;
  const minV=CIV_MILESTONES[0].val,maxV=CIV_MILESTONES[CIV_MILESTONES.length-1].val;
  const pct=Math.min(100,Math.max(0,((v-minV)/(maxV-minV))*100));
  const rank=getCivRank();

  let milestonesHtml=CIV_MILESTONES.map((m,i)=>{
    const pos=((m.val-minV)/(maxV-minV))*100;
    const reached=v>=m.val;
    const isCurrent=rank===m;
    const cls=isCurrent?'current':reached?'reached':'';
    return`<div class="civ-milestone" style="left:${pos}%"><div class="civ-dot ${cls}">${reached?m.emoji:''}</div><div class="civ-label ${cls}">${m.label}</div></div>`;
  }).join('');

  return`<div class="civ-road">
    <div class="civ-track">
      <div class="civ-line"></div>
      <div class="civ-progress" style="width:${pct}%"></div>
      ${milestonesHtml}
    </div>
    <div class="civ-rank">RANK: <strong>${rank.emoji} ${rank.title}</strong> — <span style="color:var(--cyan)">$${v.toLocaleString('en-US',{maximumFractionDigits:0})}</span> / $1,000,000 <span style="color:var(--muted)">(${pct.toFixed(1)}%)</span></div>
  </div>`;
}

// ═══ REPORTS & HEATMAP ═══
function renderReportsInner(){
  // Profit by market heatmap
  const marketPnl={};
  SYMBOLS.forEach(s=>marketPnl[s]={});
  state.bots.forEach(bot=>{
    bot.history.forEach(h=>{
      if(!marketPnl[h.sym])marketPnl[h.sym]={};
      if(!marketPnl[h.sym][bot.id])marketPnl[h.sym][bot.id]=0;
      marketPnl[h.sym][bot.id]+=h.pnl;
    });
  });

  const allBotIds=[...state.bots.map(b=>b.id)];
  let maxAbs=1;
  SYMBOLS.forEach(s=>allBotIds.forEach(id=>{const v=Math.abs(marketPnl[s]?.[id]||0);if(v>maxAbs)maxAbs=v}));

  let heatCells=`<div class="heat-cell" style="color:var(--muted)"></div>`;
  allBotIds.forEach(id=>{const b=state.bots.find(x=>x.id===id);heatCells+=`<div class="heat-cell" style="color:${b?.color||'var(--text)'}">${(b?.name||id).slice(0,3)}</div>`});

  SYMBOLS.forEach(sym=>{
    heatCells+=`<div class="heat-cell" style="color:var(--text);font-size:7px">${sym}</div>`;
    allBotIds.forEach(id=>{
      const val=marketPnl[sym]?.[id]||0;
      const intensity=Math.min(1,Math.abs(val)/maxAbs);
      const bg=val>0?`rgba(0,255,157,${intensity*.5})`:(val<0?`rgba(255,71,87,${intensity*.5})`:'rgba(255,255,255,.03)');
      heatCells+=`<div class="heat-cell" style="background:${bg};color:${val>=0?'var(--green)':'var(--red)'}">${val!==0?(val>0?'+':'')+val.toFixed(0):''}</div>`;
    });
  });

  const sorted=[...state.bots].sort((a,b)=>b.pnl-a.pnl);
  const bestBot=sorted[0],worstBot=sorted[sorted.length-1];
  const totalTrades=state.bots.reduce((a,b)=>a+b.trades,0)+state.you.trades;
  const totalWins=state.bots.reduce((a,b)=>a+b.wins,0)+state.you.wins;
  const overallWR=totalTrades?((totalWins/totalTrades)*100).toFixed(0):0;
  const totalBorrowed=state.bots.reduce((a,b)=>a+(b.borrowed||0),0)+(state.you.borrowed||0);
  const netHouse=state.vault+totalBorrowed;
  const taxCollected=state.taxCollected??0;

  return`<div class="reports-inner">
    <div class="report-block">
      <div class="report-title" style="color:var(--gold)">PROFIT HEATMAP</div>
      <div class="heatmap-grid" style="grid-template-columns:repeat(${allBotIds.length+1},1fr)">${heatCells}</div>
    </div>
    <div class="report-block">
      <div class="report-title" style="color:var(--cyan)">ARENA STATS</div>
      <div class="report-row"><span>Total Trades</span><span class="rv" style="color:var(--text)">${totalTrades}</span></div>
      <div class="report-row"><span>Win Rate</span><span class="rv" style="color:var(--cyan)">${overallWR}%</span></div>
      <div class="report-row"><span>Best Bot</span><span class="rv" style="color:var(--green)">${bestBot?bestBot.emoji+' '+bestBot.name:'-'} +$${bestBot?.pnl?.toFixed(0)||0}</span></div>
      <div class="report-row"><span>Worst Bot</span><span class="rv" style="color:var(--red)">${worstBot?worstBot.emoji+' '+worstBot.name:'-'} $${worstBot?.pnl?.toFixed(0)||0}</span></div>
      <div class="report-row"><span>Margin Out</span><span class="rv" style="color:var(--amber)">$${totalBorrowed.toFixed(0)}</span></div>
      <div class="report-row"><span>Net House Equity</span><span class="rv" style="color:var(--gold)">$${netHouse.toLocaleString('en-US',{maximumFractionDigits:0})}</span></div>
      <div class="report-row"><span>Tax Collected</span><span class="rv" style="color:var(--green)">$${taxCollected.toFixed(0)}</span></div>
      <div class="report-row"><span>Vault P&L</span><span class="rv" style="color:${state.vault>=VAULT_START?'var(--green)':'var(--red)'}">${state.vault>=VAULT_START?'+':''}$${(state.vault-VAULT_START).toFixed(0)}</span></div>
    </div>
    <div class="report-block">
      <div class="report-title" style="color:var(--green)">VAULT CHART</div>
      <div style="height:60px"><canvas id="vault-chart-canvas" style="width:100%;height:100%"></canvas></div>
    </div>
  </div>`;
}
